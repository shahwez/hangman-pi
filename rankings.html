<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Rankings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .ranking-container { padding: 20px; }
        table { width: 100%; max-width: 500px; margin: 20px auto; border-collapse: collapse; background: #222; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #444; }
        th { background: #673ab7; color: white; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #555; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="ranking-container">
        <h1>🏆 Global Top 100</h1>
        <table>
            <thead>
                <tr><th>Rank</th><th>User</th><th>Streak</th></tr>
            </thead>
            <tbody id="rank-data"></tbody>
        </table>
        <a href="index.html" class="back-btn">Back to Game</a>
    </div>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsuU8vSH5qRfcm5E78Q7KFYHFJTOTKGDM",
            authDomain: "://firebaseapp.com",
            projectId: "hangman-pi",
            storageBucket: "://appspot.com",
            messagingSenderId: "681316672354",
            appId: "1:681316672354:web:98f18d8c086729416bc23b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("leaderboard").orderBy("streak", "desc").limit(100).get().then((querySnapshot) => {
            let rows = "";
            let count = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                rows += `<tr><td>${count}</td><td>${data.username}</td><td>${data.streak}</td></tr>`;
                count++;
            });
            document.getElementById('rank-data').innerHTML = rows || "<tr><td colspan='3'>No scores yet!</td></tr>";
        });
    </script>
</body>
</html>
