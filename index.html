<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangman Elite - Pi Network</title>
    <script src="https://minepi.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>🎮 HANGMAN <span class="accent">ELITE</span></h1>
            <div id="playerStatus" class="badge">HANDSHAKE PENDING...</div>
        </header>

        <button id="loginBtn" class="premium-btn login" onclick="authPi()">🔐 LOGIN WITH PI</button>

        <div class="stats-row">
            <div class="stat-card">
                <span class="label">STREAK</span>
                <span id="streak" class="value">0</span>
                <small id="bonusText" style="color: #ffa500; font-size: 0.5rem;"></small>
            </div>
            <div class="stat-card">
                <span class="label">SCORE</span>
                <span id="score" class="value">0</span>
            </div>
            <button class="mute-toggle" onclick="toggleMute()" id="muteBtn">🔊</button>
        </div>

        <canvas id="hangmanCanvas" width="200" height="160"></canvas>

        <div class="setup-section">
            <select id="category">
                <option value="countries">Countries</option>
                <option value="cities">Cities</option>
                <option value="soccer">Soccer</option>
                <option value="cricket">Cricket</option>
                <option value="hollywood">Hollywood</option>
                <option value="bollywood">Bollywood</option>
            </select>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard 🔥</option>
            </select>
        </div>

        <div class="action-grid">
            <button class="play-btn" onclick="startGame()">START MISSION</button>
            <button class="daily-btn" onclick="startDailyQuiz()">📅 DAILY CHALLENGE</button>
        </div>

        <div class="game-area">
            <div id="word" class="word-display">READY?</div>
            <div id="status" class="game-msg"></div>
            <div id="letters" class="keyboard"></div>
        </div>

        <button id="hintBtn" class="hint-btn" onclick="buyHint()">💡 UNLOCK HINT (0.01 PI)</button>

        <section class="leaderboard-section">
            <h3>🏆 WORLD RANKINGS</h3>
            <div class="scroll-box"><ul id="scores"></ul></div>
        </section>
    </div>

    <audio id="bgmusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="app.js"></script>
</body>
</html>
